<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎫 控制台 · YAOLO</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎫</text></svg>">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="/" class="navbar-brand">
        <span class="emoji">🎫</span>
        <span>YAOLO</span>
      </a>
      <div class="navbar-links">
        <a href="/" class="navbar-link">首页</a>
        <a href="/dashboard" class="navbar-link active">控制台</a>
        <a href="/admin" class="navbar-link" id="adminLink" style="display:none">管理</a>
      </div>
      <div id="navAuth"></div>
    </div>
  </nav>

  <div class="toast-container" id="toastContainer"></div>

  <main class="container dashboard">
    <!-- 用户设置卡片 -->
    <div class="card" style="margin-bottom:24px;">
      <div class="card-header">
        <h2 class="card-title">👤 账号设置</h2>
        <button class="btn btn-sm btn-secondary" onclick="toggleSettings()" id="toggleSettingsBtn">展开</button>
      </div>
      <div id="settingsPanel" class="hidden">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Interpark 账号</label>
            <input type="text" class="form-input" id="settingInterparkId" placeholder="Interpark 用户名">
          </div>
          <div class="form-group">
            <label class="form-label">Interpark 密码</label>
            <input type="password" class="form-input" id="settingInterparkPw" placeholder="Interpark 密码">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Weverse ID</label>
            <input type="text" class="form-input" id="settingWeverseId" placeholder="Weverse 用户名">
          </div>
          <div class="form-group">
            <label class="form-label">是否有会员预售资格</label>
            <div style="display:flex; align-items:center; gap:8px; margin-top:10px;">
              <input type="checkbox" id="settingHasPresale" style="accent-color:var(--primary); width:18px; height:18px;">
              <span style="font-size:0.9rem; color:var(--text-dim);">是，我有 Weverse 会员预售资格</span>
            </div>
          </div>
        </div>
        <button class="btn btn-primary" onclick="saveSettings()">💾 保存设置</button>
      </div>
    </div>

    <!-- 统计卡片 -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card">
        <div class="stat-value" id="statTotal">0</div>
        <div class="stat-label">总订单</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statPending" style="background:linear-gradient(135deg,var(--warning),#d97706);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">0</div>
        <div class="stat-label">待处理</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statGrabbing" style="background:linear-gradient(135deg,var(--info),#2563eb);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">0</div>
        <div class="stat-label">抢票中</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statSuccess" style="background:linear-gradient(135deg,var(--success),#059669);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">0</div>
        <div class="stat-label">成功</div>
      </div>
    </div>

    <!-- 新建订单 -->
    <div class="card" style="margin-bottom:24px;">
      <div class="card-header">
        <h2 class="card-title">➕ 新建抢票订单</h2>
      </div>

      <!-- Tab 切换 -->
      <div class="tabs">
        <button class="tab active" onclick="switchOrderTab('presale')">🔥 会员预售</button>
        <button class="tab" onclick="switchOrderTab('general')">🎫 一般开售</button>
        <button class="tab" onclick="switchOrderTab('upgrade')">⬆️ 升舱</button>
      </div>

      <form id="orderForm" onsubmit="createOrder(event)">
        <div class="form-group">
          <label class="form-label">演出 URL</label>
          <input type="url" class="form-input" id="orderPerfUrl"
                 placeholder="https://tickets.interpark.com/goods/..."
                 required>
          <span class="form-hint">在 Interpark 上找到 Weverse Con 2026 演出页面，复制完整 URL</span>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">场次</label>
            <select class="form-select" id="orderSchedule">
              <option value="0">Day 1 (第一天)</option>
              <option value="1">Day 2 (第二天)</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">并发标签页数</label>
            <select class="form-select" id="orderTabs">
              <option value="1">1 个（稳定）</option>
              <option value="2">2 个</option>
              <option value="3">3 个</option>
              <option value="4" selected>4 个（推荐）</option>
              <option value="5">5 个</option>
              <option value="6">6 个（极限）</option>
            </select>
          </div>
        </div>

        <div class="form-group" id="presaleTimeGroup">
          <label class="form-label">会员预售时间 (韩国时间 KST)</label>
          <input type="datetime-local" class="form-input" id="orderPresaleTime">
          <span class="form-hint">格式: YYYY-MM-DDTHH:mm (韩国时间 = UTC+9)</span>
        </div>

        <div class="form-group">
          <label class="form-label">一般开售时间 (韩国时间 KST)</label>
          <input type="datetime-local" class="form-input" id="orderOpenTime">
        </div>

        <div class="form-group">
          <label class="form-label">座位偏好 (按优先级选择)</label>
          <div class="seat-selector" id="seatSelector">
            <label class="seat-option selected"><input type="checkbox" value="0" checked> VIP 站席</label>
            <label class="seat-option selected"><input type="checkbox" value="1" checked> VIP 坐席</label>
            <label class="seat-option selected"><input type="checkbox" value="2" checked> SR</label>
            <label class="seat-option selected"><input type="checkbox" value="3" checked> R</label>
            <label class="seat-option selected"><input type="checkbox" value="4" checked> S</label>
            <label class="seat-option"><input type="checkbox" value="5"> A</label>
          </div>
          <span class="form-hint">系统将按勾选顺序尝试座位等级</span>
        </div>

        <div class="form-group">
          <label class="form-label">代理 (可选)</label>
          <input type="text" class="form-input" id="orderProxy"
                 placeholder="socks5://host:port 或 http://host:port">
        </div>

        <button type="submit" class="btn btn-primary btn-lg btn-block">
          🚀 创建抢票订单
        </button>
      </form>
    </div>

    <!-- 订单列表 -->
    <div class="orders-section">
      <div class="orders-header">
        <h2 class="orders-title">📋 我的订单</h2>
        <button class="btn btn-sm btn-secondary" onclick="loadOrders()">🔄 刷新</button>
      </div>
      <div id="ordersList">
        <p style="text-align:center; color:var(--text-dim); padding:40px;">加载中...</p>
      </div>
    </div>
  </main>

  <!-- 订单详情模态框 -->
  <div class="modal-overlay" id="orderDetailModal">
    <div class="modal" style="max-width:700px;">
      <div class="modal-header">
        <h2 class="modal-title">订单详情</h2>
        <button class="modal-close" onclick="closeModal('orderDetailModal')">&times;</button>
      </div>
      <div id="orderDetailContent"></div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
